name: terraform-deploy (reusable)

# Reusable deploy pipeline for the agent-platform Rust-Lambda services:
# build the Lambda zip -> assume the per-service deploy role via OIDC ->
# terraform init (S3 backend) -> apply -> optional smoke check.
#
# One definition for every service; callers pass only what differs (account
# role, artifact path, any service-specific TF_VARs, smoke URLs). Replaces the
# per-repo copy-pasted deploy jobs.
#
# Caller example (service repo .github/workflows/deploy.yml):
#   jobs:
#     test:
#       uses: ./.github/workflows/test.yml
#     deploy:
#       needs: test
#       permissions: { id-token: write, contents: read }
#       uses: stackwell-labs/shared-terraform/.github/workflows/terraform-deploy.yml@main
#       with:
#         aws_role_arn: arn:aws:iam::<acct>:role/github-actions-deploy
#         lambda_zip_path: backend/build/lambda/<svc>/bootstrap.zip
#         tf_vars: |
#           TF_VAR_some_flag=on
#         smoke_health_url: https://<svc-domain>/health

on:
  workflow_call:
    inputs:
      aws_role_arn:
        description: ARN of the per-service github-actions-deploy role to assume via OIDC.
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
      terraform_version:
        required: false
        type: string
        default: "1.6.6"
      cargo_workspace:
        description: Path passed to rust-cache (the Cargo workspace dir).
        required: false
        type: string
        default: backend
      build_script:
        description: Script that builds the Lambda bootstrap.zip.
        required: false
        type: string
        default: backend/scripts/build-lambda.sh
      working_directory:
        description: Directory containing the service's terraform.
        required: false
        type: string
        default: backend/infra/aws
      backend_config_file:
        required: false
        type: string
        default: backend.hcl
      lambda_zip_path:
        description: Built zip path relative to the workspace; exported as TF_VAR_lambda_zip_path when set. Leave empty if the service's terraform reads the artifact from its own var default.
        required: false
        type: string
        default: ""
      tf_vars:
        description: Newline-separated extra TF_VAR_x=value pairs for the apply.
        required: false
        type: string
        default: ""
      smoke_health_url:
        description: If set, GET it after apply and fail on non-2xx.
        required: false
        type: string
        default: ""
      smoke_authed_url:
        description: If set, GET it unauthenticated after apply and require HTTP 401.
        required: false
        type: string
        default: ""
      git_app_id:
        description: >-
          If set, mint a short-lived GitHub App installation token to clone
          PRIVATE git deps (paired with the git_app_private_key secret), instead
          of git_token. The App must be installed on the org named by
          git_app_owner (default: this repo's org) with read access to the
          dependency repos. Minted in-job (a token can't be passed via
          cross-job outputs — GitHub blanks masked values there).
        required: false
        type: string
        default: ""
      git_app_owner:
        description: >-
          Org whose App installation the token is minted against. Defaults to
          the calling repo's owner; set it when the private deps live in a
          DIFFERENT org than the caller (e.g. chirpauth/server-dev depending
          on stackwell-labs/vault).
        required: false
        type: string
        default: ""
    secrets:
      tf_var_secrets:
        description: >-
          Newline-separated TF_VAR_x=value pairs sourced from GitHub secrets
          (masked in logs). The caller maps its own secret names into TF_VAR_*
          lines; see a caller's deploy.yml for the concrete form.
        required: false
      git_token:
        description: >-
          Optional token for cloning PRIVATE git dependencies during the build
          (e.g. a private Cargo git dep). When set, git is configured to use it
          for github.com over https. Leave unset for services with no private deps.
        required: false
      git_app_private_key:
        description: >-
          PEM private key for git_app_id. When both are set, an installation
          token is minted in-job and used for private git deps (preferred over a
          long-lived git_token PAT).
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.cargo_workspace }}

      # Mint an install token in-job when a GitHub App is configured (a token
      # can't be threaded from a separate job — GitHub blanks masked values in
      # cross-job outputs). Falls back to the git_token secret otherwise.
      - name: mint git app token (private deps)
        id: git_app_token
        if: ${{ inputs.git_app_id != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ inputs.git_app_id }}
          private-key: ${{ secrets.git_app_private_key }}
          owner: ${{ inputs.git_app_owner || github.repository_owner }}

      - name: configure private git deps
        env:
          GIT_TOKEN: ${{ steps.git_app_token.outputs.token || secrets.git_token }}
        run: |
          if [ -n "${GIT_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: build lambda zip
        run: bash ${{ inputs.build_script }}

      - name: configure aws via oidc
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: terraform setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: terraform init
        working-directory: ${{ inputs.working_directory }}
        env:
          BACKEND_CONFIG_FILE: ${{ inputs.backend_config_file }}
        run: |
          set -euo pipefail
          if [ -n "$BACKEND_CONFIG_FILE" ]; then
            terraform init -input=false -backend-config="$BACKEND_CONFIG_FILE"
          else
            terraform init -input=false
          fi

      # Secrets come from AWS Secrets Manager via the terraform itself (none in
      # GitHub). Only the built artifact path plus any caller-supplied TF_VARs.
      - name: terraform apply
        working-directory: ${{ inputs.working_directory }}
        env:
          LAMBDA_ZIP_PATH: ${{ inputs.lambda_zip_path }}
          WORKSPACE: ${{ github.workspace }}
          EXTRA_TF_VARS: ${{ inputs.tf_vars }}
          TF_VAR_SECRETS: ${{ secrets.tf_var_secrets }}
        run: |
          set -euo pipefail
          if [ -n "$LAMBDA_ZIP_PATH" ]; then
            export TF_VAR_lambda_zip_path="$WORKSPACE/$LAMBDA_ZIP_PATH"
          fi
          # non-secret vars, then masked secret-sourced vars
          for blob in "$EXTRA_TF_VARS" "$TF_VAR_SECRETS"; do
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              export "$line"
            done <<< "$blob"
          done
          terraform apply -auto-approve -input=false

      - name: smoke check
        if: ${{ inputs.smoke_health_url != '' }}
        env:
          HEALTH_URL: ${{ inputs.smoke_health_url }}
          AUTHED_URL: ${{ inputs.smoke_authed_url }}
        run: |
          set -euo pipefail
          curl -fsS -o /dev/null -w "health HTTP %{http_code}\n" "$HEALTH_URL"
          if [ -n "$AUTHED_URL" ]; then
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$AUTHED_URL")
            if [ "$code" != "401" ]; then
              echo "FAIL: expected 401 from $AUTHED_URL, got $code"; exit 1
            fi
          fi
          echo "smoke checks passed"
